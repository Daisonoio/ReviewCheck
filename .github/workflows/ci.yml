name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Restore
        run: dotnet restore ReviewCheck.sln
      - name: Build
        run: dotnet build ReviewCheck.sln --configuration Release --no-restore
      - name: Test
        run: dotnet test ReviewCheck.sln --configuration Release --no-build --verbosity normal
